<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Task Item Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
    <article class="todo-card" data-testid="test-todo-card">
    <h3 class="title" data-testid="test-todo-title">Submit frontend assignment</h3>

    <p data-testid="test-todo-description">
      Build an accessible todo card component with semantic HTML, keyboard support, and test-friendly selectors.
    </p>

    <div>
      <span class="badge" data-testid="test-todo-priority" aria-label="High priority">High</span>
    </div>

    <div class="meta">
      <time data-testid="test-todo-due-date" id="dueDate"></time>
      <div data-testid="test-todo-time-remaining" id="timeRemaining" aria-live="polite"></div>
      <div data-testid="test-todo-status" id="statusText">In Progress</div>
    </div>

    <div style="margin-top:16px;">
      <input data-testid="test-todo-complete-toggle" type="checkbox" id="completeToggle" />
      <label for="completeToggle">Mark task as complete</label>
    </div>

    <ul class="tags" role="list" data-testid="test-todo-tags">
      <li class="tag" data-testid="test-todo-tag-work">Work</li>
      <li class="tag" data-testid="test-todo-tag-urgent">Urgent</li>
    </ul>

    <div class="actions">
      <button data-testid="test-todo-edit-button" type="button" id="editBtn">Edit</button>
      <button data-testid="test-todo-delete-button" type="button" id="deleteBtn">Delete</button>
    </div>
  </article>

<script src="script.js"></script>
</body>
</html>
