<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Task Item Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
    <article class="card" data-testid="test-todo-card">

      <!-- view mode starts here -->
  <div id="viewMode">

    <!-- title and priority badge row starts here -->
    <div class="row">
      <h3 data-testid="test-todo-title" id="title"></h3>
      <span data-testid="test-todo-priority" id="priorityBadge" class="badge"></span>
    </div>
    <!-- title and priority badge row ends here -->

    <!-- indicator div -->
    <div data-testid="test-todo-priority-indicator" id="priorityIndicator" class="indicator"></div>

    <!-- description section and expand-collapse div starts here -->
    <div data-testid="test-todo-collapsible-section" id="todo-desc-section">
      <p data-testid="test-todo-description" id="description"></p>
      <button data-testid="test-todo-expand-toggle" id="expandBtn" aria-controls="todo-desc-section" aria-expanded="false">Expand</button>
    </div>
   <!-- description section and expand-collapse div ends here -->

  
   <!-- due date and time remaining div starts here -->
   <div class="row">
    <time data-testid="test-todo-due-date" id="dueDate"></time>
    <div data-testid="test-todo-time-remaining" id="timeRemaining" aria-live="polite"></div>
    <div data-testid="test-todo-overdue-indicator" id="overdueIndicator" class="overdue hidden">Overdue</div>
   </div>
    <!-- due date and time remaining div ends here -->

    
    <div data-testid="test-todo-status" id="statusText"></div>
    <select data-testid="test-todo-status-control" id="statusControl">
      <option>Pending</option><option>In Progress</option><option>Done</option>
    </select>

    <!-- markascomplete div starts here -->
    <div class="markascomplete">
      <input data-testid="test-todo-complete-toggle" id="checkbox" type="checkbox">
      <label for="checkbox">Mark complete</label>
    </div>
    <!-- markascomplete div ends here -->

    <ul data-testid="test-todo-tags" class="tags" role="list">
      <li data-testid="test-todo-tag-work">Work</li>
      <li data-testid="test-todo-tag-urgent">Urgent</li>
    </ul>

    <div class="row" style="margin-top:16px">
      <button data-testid="test-todo-edit-button" id="editBtn">Edit</button>
      <button data-testid="test-todo-delete-button" id="deleteBtn">Delete</button>
    </div>
  </div>
      <!-- view mode ends here -->

  <!-- edit card starts here -->
  <form data-testid="test-todo-edit-form" id="editForm" class="hidden">
    <input data-testid="test-todo-edit-title-input" id="editTitle" placeholder="Todo title">
    <textarea data-testid="test-todo-edit-description-input" id="editDescription" placeholder="Todo description"></textarea>
    <select data-testid="test-todo-edit-priority-select" id="editPriority"><option>Low</option><option>Medium</option><option>High</option></select>
    <input data-testid="test-todo-edit-due-date-input" id="editDue" type="datetime-local">
    <div class="row" style="margin-top:12px">
      <button data-testid="test-todo-save-button" id="saveBtn" type="submit">Save</button>
      <button data-testid="test-todo-cancel-button" id="cancelBtn" type="button">Cancel</button>
    </div>
  </form>
</article>

<script src="script.js"></script>
</body>
</html>
